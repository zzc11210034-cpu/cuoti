<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOGIC_VAULT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      // Suppress Vite sseError when HMR is disabled
      window.sseError = function() {};
      
      // Safely mock localStorage if blocked by iframe sandbox
      try {
        var test = window.localStorage;
      } catch (e) {
        console.warn('localStorage is blocked, using memory storage fallback');
        var memStorage = {};
        Object.defineProperty(window, 'localStorage', {
          value: {
            getItem: function(key) { return memStorage[key] || null; },
            setItem: function(key, val) { memStorage[key] = String(val); },
            removeItem: function(key) { delete memStorage[key]; },
            clear: function() { memStorage = {}; }
          },
          writable: true
        });
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
